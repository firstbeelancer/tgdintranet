<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор квот | TGD Intranet</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F4F6FA;
      color: #0B1F4D;
      margin: 0;
      padding: 60px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 520px;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 4px 16px rgba(11,31,77,0.06);
    }
    h1 { margin: 0 0 12px; font-size: 28px; font-weight: 700; }
    p  { margin: 0 0 16px; line-height: 1.6; color: #475569; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #DBE5FF;
      color: #0B1F4D;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    a.btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      background: #0B1F4D;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">TGD Intranet</span>
    <h1>Конструктор квот</h1>
    <p>Раздел в разработке. Используйте шаблоны из <strong>TGD Intranet → Маркетинг → Шаблоны</strong> для подготовки коммерческих предложений.</p>
    <p>По вопросам подключения конструктора обратитесь к маркетингу.</p>
    <a class="btn" href="/marketing">Открыть раздел Маркетинг</a>
  </div>
</body>
</html>
