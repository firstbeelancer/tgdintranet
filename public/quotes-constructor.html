<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Коммерческое предложение | ТехноГид</title>
  <link href="https://fonts.googleapis.com/css?family=Evolventa:400,600,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #E7EFFF;
      margin: 0;
      padding: 0;
      font-family: 'Evolventa', Arial, sans-serif;
    }
    .main-layout {
      display: flex;
      gap: 44px;
      justify-content: center;
      align-items: flex-start;
      margin: 26px auto;
      max-width: 1800px;
    }
    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 32px 28px 24px;
      min-width: 355px;
      max-width: 400px;
    }
    .panel h2 {
      color: #035094;
      font-size: 21px;
      margin-bottom: 15px;
      font-weight: 700;
    }
    label {
      font-weight: 600;
      color: #48525C;
      display: block;
      margin-bottom: 2px;
      font-size: 15px;
    }
    input, select {
      width: 100%;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.4px solid #B5C6E0;
      margin-bottom: 13px;
      font-size: 16px;
      background: #F7FAFF;
      color: #035094;
      font-family: inherit;
      transition: border .15s;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #035094; }
    .products-panel { margin-top: 24px; }
    .add-btn, .pdf-btn {
      background: #035094;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 34px;
      font-family: 'Evolventa', Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
      transition: background .16s;
      letter-spacing: 1px;
      box-shadow: 0 4px 8px rgba(3, 80, 148, 0.3);
    }
    .add-btn:hover, .pdf-btn:hover { background: #035094; }
    .remove-btn {
      background: #940350;
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 5px 15px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-left: 6px;
      transition: background .12s;
      box-shadow: 0 4px 8px rgba(148, 3, 80, 0.3)
    }
    .remove-btn:hover { background: #940350; }
    .product-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }
    .product-row input[type="text"] { width: 180px; }
    .product-row input[type="number"] { width: 60px; }
    .product-row .price-input { width: 88px; }
    .vat-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      width: 100%;
    }
    .vat-checkbox {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #940350;
    }
    .vat-checkbox input[type="checkbox"] {
      width: auto;
      margin: 0;
      transform: scale(1.2);
      accent-color: #940350;
      cursor: pointer;
    }
    .vat-checkbox input[type="checkbox"]:disabled {
      opacity: 0.5;
    }
    .vat-checkbox label {
      color: #49525D;
      cursor: pointer;
      font-weight: 600;
    }
    .vat-rate-input {
      width: 50px !important;
      font-size: 12px;
      padding: 4px 6px;
      margin: 0;
    }
    
    /* Стили для шаблонов */
    .template-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid #e9ecef;
    }
    
    .template-name {
      font-size: 14px;
      color: #035094;
      font-weight: 500;
      flex: 1;
      cursor: pointer;
    }
    
    .template-name:hover {
      text-decoration: underline;
    }
    
    .template-actions {
      display: flex;
      gap: 6px;
    }
    
    .template-btn {
      background: #035094;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .template-btn:hover {
      background: #024a7a;
    }
    
    .template-btn.delete {
      background: #940350;
    }
    
    .template-btn.delete:hover {
      background: #7a0242;
    }

    .a4-preview-wrap {
      background: #B5C6E0;
      padding: 22px 0;
      border-radius: 18px;
      min-width: 860px;
    }
    .a4-preview {
      background: #fff;
      width: 794px;
      min-height: 1122px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: visible;
      position: relative;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .quote-content {
      padding: 0 45px 120px 45px;
      color: #035094;
      font-size: 10px;
      font-family: 'Evolventa', Arial, sans-serif;
      width: 704px;
      flex: 1;
    }
    /* Контейнер для шапки с изображением */
    .header-container {
      position: relative;
      width: 794px;
      margin: 0 0 26px -45px;
      border-radius: 0 0 0 0;
      overflow: hidden;
    }
    /* Шапка - изображение */
    .header-img {
      width: 100%;
      height: auto;
      object-fit: cover;
      max-height: 200px;
      min-height: 150px;
      display: block;
    }
    /* Overlay с финансовыми данными поверх изображения */
    .company-findata {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(3, 80, 148, 0);
      padding: 15px 20px;
      border-radius: 8px;
      font-family: 'Evolventa', Arial, sans-serif;
      font-size: 10px;
      color: #ffffff;
      line-height: 1.4;
      max-width: 350px;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0);
    }
    /* Новый блок для секций информации */
    .info-sections {
      display: flex;
      gap: 60px;
      margin: 0 0 36px 0;
      justify-content: flex-start;
    }
    .info-section {
      width: 320px;
    }
    .info-title-plashka {
      background: #E7EFFF;
      color: #49525C;
      font-size: 12px;
      font-weight: bold;
      border-radius: 8px;
      padding: 16px 0;
      text-align: center;
      margin-bottom: 18px;
      font-family: 'Evolventa', Arial, sans-serif;
    }
    .info-table {
      width: 100%;
      border-collapse: collapse;
      background: none;
      font-size: 10px;
      font-family: 'Evolventa', Arial, sans-serif;
    }
    .info-table td {
      border: none;
      padding: 7px 0 7px 0;
      vertical-align: baseline;
      color: #49525C;
      font-weight: 500;
      font-size: 10px;
    }
    .info-table td.value {
      color: #035094;
      font-weight: 500;
      padding-left: 18px;
      white-space: nowrap;
    }
    .info-table td.value a {
      color: #035094;
      text-decoration: none;
      font-weight: 500;
    }
    .main-title {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #035094;
      letter-spacing: 1px;
      margin: 24px 0 18px 0;
    }
    .intro-text {
      text-align: center;
      font-size: 10px;
      color: #49525D;
      margin: 0 0 24px 0;
      line-height: 1.4;
    }
    /* Исправленные стили таблицы */
    .table-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: none;
      border: none;
    }
    .quote-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-family: 'Evolventa', Arial, sans-serif;
      font-size: 10px;
      border-radius: 16px;
      overflow: hidden;
      table-layout: fixed;
    }
    .quote-table thead tr {
      background: #035094;
    }
    .quote-table th {
      color: #fff;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Evolventa', Arial, sans-serif;
      padding: 13px 6px;
      border: none;
      text-transform: uppercase; /*заглавный регистр в шапке таблицы квоты*/
      letter-spacing: 0.3px;
      vertical-align: middle;
    }
    .quote-table th:first-child {
      border-radius: 16px 0 0 0;
      width: 8%;
    }
    .quote-table th:nth-child(2) {
      width: 35%;
    }
    .quote-table th:nth-child(3) {
      width: 12%;
    }
    .quote-table th:nth-child(4) {
      width: 15%;
    }
    .quote-table th:nth-child(5) {
      width: 15%;
    }
    .quote-table th:last-child {
      border-radius: 0 16px 0 0;
      width: 15%;
    }
    .quote-table tbody tr {
      background: #f8f9fa;
    }
    .quote-table tbody tr:nth-child(even) {
      background: #f1f3f4;
    }
    .quote-table tbody td {
      text-align: center;
      font-size: 10px;
      color: #333;
      padding: 10px 6px;
      border: none;
      font-weight: 500;
      vertical-align: middle;
    }
    .quote-table tbody td:first-child {
      color: #035094;
      font-weight: 700;
      font-size: 10px;
    }
    .quote-table tbody td:nth-child(2) {
      text-align: left;
      padding-left: 15px;
    }
    .quote-table tbody td:nth-child(3),
    .quote-table tbody td:nth-child(4),
    .quote-table tbody td:nth-child(5),
    .quote-table tbody td:nth-child(6) {
      text-align: right;
      padding-right: 15px;
      font-weight: 600;
    }
    /* Итоговые строки */
    .quote-table tfoot tr {
      background: #035094 !important;
    }
    .quote-table tfoot td {
      color: #fff !important;
      font-family: 'Evolventa', Arial, sans-serif;
      font-size: 12px !important;
      font-weight: 700 !important;
      padding: 13px 15px !important;
      border: none !important;
      text-align: right !important;
      padding: 13px -60px 13px 15px !important; /* Увеличиваем правый отступ */
    }
    .quote-table tfoot td:last-child {
      text-align: right !important;
      font-size: 12px !important;
    }
    .quote-table tfoot tr:first-child td:first-child {
      border-top: 2px solid #035094;
    }
    .quote-table tfoot tr:last-child td:first-child {
      border-radius: 0 0 0 16px;
    }
    .quote-table tfoot tr:last-child td:last-child {
      border-radius: 0 0 16px 0;
    }
    .footer-block-outer {
      background: #E7EFFF;
      border-radius: 14px;
      padding: 18px 22px 16px 22px;
      margin: 30px 0 20px 0;
      font-size: 10px;
      color: #48525C;
      font-weight: 400;
      font-family: 'Evolventa', Arial, sans-serif;
      letter-spacing: 0.5px;
    }
    .footer-block-row {
      margin-bottom: 8px;
    }
    .footer-block-row b {
      font-weight: 700;
      color: #035094;
      font-size: 10px;
    }
    /* Новый стиль для блока подписи */
    .signature-block {
      margin-top: 36px;
      display: flex;
      align-items: flex-end;
      gap: 36px;
    }
    .signature-line {
      display: flex;
      align-items: baseline;
      font-size: 10px;
      color: #48525C;
      font-weight: 400;
      margin-bottom: 20px;
      position: relative;
    }
    .signature-title {
      white-space: nowrap;
    }
    .signature-underline {
      width: 113px;
      height: 0.5px;
      background-color: #48525C;
      margin: 0 15px;
      position: relative;
      top: -2px;
    }
    .signature-name {
      font-weight: 500;
      color: #48525C;
      white-space: nowrap;
    }
    .stamp-placeholder {
      width: 80px;
      height: 80px;
      border: 2px dashed #035094;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8pt;
      color: #035094;
      margin: 0 auto 10px;
    }
    .stamp-img {
      width: 160px;
      height: 160px;
      max-width: 160px;
      max-height: 160px;
      min-width: 80px;
      min-height: 80px;
      opacity: 0.8;
      border-radius: 6px;
      object-fit: contain;
      margin: 0 auto 10px;
      display: block;
      position: relative;
      top: 30px;
      left: -110px;
    }
    .signature-img {
      max-height: 80px;
      max-width: 240px;
      opacity: 0.98;
      border-radius: 4px;
      position: absolute;
      bottom: 2px;
      left: 113px;
      margin-top: -30px;
      margin-left: 80px;
      object-fit: contain;
    }
    /* Стиль для bottom-bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 794px;
      height: auto;
      min-height: 60px;
      max-height: 120px;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      border-radius: 0 0 24px 24px;
      overflow: hidden;
      background: #fff;
      z-index: 10;
    }
    .footer-img {
      width: 794px;
      height: auto;
      min-height: 60px;
      max-height: 120px;
      object-fit: cover;
      object-position: bottom;
      display: block;
      border-radius: 0 0 24px 24px;
    }
    @media print {
      body * { visibility: hidden; }
      .a4-preview, .a4-preview * { visibility: visible; }
      .a4-preview {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        height: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body>
<div class="main-layout">
  <div class="panel">
    <h2>Данные КП</h2>
    <label>Кому</label>
    <input type="text" id="customer" value="ООО АШАН" onchange="updatePreview()">
    <label>ИНН</label>
    <input type="text" id="inn" value="123456789" onchange="updatePreview()">
    <label>ФИО</label>
    <input type="text" id="fio" value="Севостьянов Михаил" onchange="updatePreview()">
    <label>Менеджер</label>
    <input type="text" id="manager" value="Калмыкова Виолетта" onchange="updatePreview()">
    <label>Дата</label>
    <input type="date" id="date" value="2025-05-12" onchange="updatePreview()">
    <label>№ КП</label>
    <input type="text" id="quoteNo" value="М-123-5-25" onchange="updatePreview()">
    <h2 style="margin-top: 24px;">Условия предложения</h2>
    <label>Срок действия предложения (дата)</label>
    <input type="date" id="validityDate" onchange="updatePreview()">
    <label>Срок поставки</label>
    <input type="text" id="deliveryTerm" value="60 рабочих дней" placeholder="Например: 60 рабочих дней" onchange="updatePreview()">
    <h2 style="margin-top: 24px;">Шапка документа</h2>
    <label>Загрузить изображение шапки</label>
    <input type="file" id="header-image" accept="image/*" onchange="loadHeaderImage(this)" style="margin-bottom: 10px;">
    <button class="add-btn" onclick="removeHeaderImage()" style="background: #940350; box-shadow: 0 4px 8px rgba(148, 3, 80, 0.3); padding: 8px 16px; font-size: 14px;">Удалить шапку</button>
    <h2 style="margin-top: 24px;">Футер документа</h2>
    <label>Загрузить изображение футера</label>
    <input type="file" id="footer-image" accept="image/*" onchange="loadFooterImage(this)" style="margin-bottom: 10px;">
    <button class="add-btn" onclick="removeFooterImage()" style="background: #940350; box-shadow: 0 4px 8px rgba(148, 3, 80, 0.3); padding: 8px 16px; font-size: 14px;">Удалить футер</button>
    <h2 style="margin-top: 24px;">Подпись и печать</h2>
    <label>Загрузить изображение подписи</label>
    <input type="file" id="signature-image" accept="image/*" onchange="loadSignatureImage(this)" style="margin-bottom: 10px;">
    <button class="add-btn" onclick="removeSignatureImage()" style="background: #940350; box-shadow: 0 4px 8px rgba(148, 3, 80, 0.3); padding: 8px 16px; font-size: 14px;">Удалить подпись</button>
    <label style="margin-top: 15px;">Загрузить изображение печати</label>
    <input type="file" id="stamp-image" accept="image/*" onchange="loadStampImage(this)" style="margin-bottom: 10px;">
    <button class="add-btn" onclick="removeStampImage()" style="background: #940350; box-shadow: 0 4px 8px rgba(148, 3, 80, 0.3); padding: 8px 16px; font-size: 14px;">Удалить печать</button>
    <div class="products-panel">
      <h2>Позиции</h2>
      <div id="products-list"></div>
      <button class="add-btn" onclick="addRow()">Добавить позицию</button>
    </div>
    <button class="pdf-btn" style="background: linear-gradient(75deg, #111B41, #111B41, #111B41); margin-top:28px" onclick="generatePDF()">Генерировать PDF</button>
    
    <!-- Блок для работы с шаблонами -->
    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #B5C6E0;">
      <h2>Шаблоны</h2>
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <input type="text" id="templateName" placeholder="Название шаблона" style="flex: 1;">
        <button class="add-btn" onclick="saveTemplate()" style="padding: 8px 16px; font-size: 14px;">Сохранить</button>
      </div>
      <div id="templatesList"></div>
      <div style="margin-top: 10px;">
        <input type="file" id="templateFile" accept=".json" onchange="importTemplate(this)" style="margin-bottom: 8px;">
        <button class="add-btn" onclick="exportAllTemplates()" style="background: linear-gradient(124deg, #940350, #5a2a72, #035094); padding: 8px 16px; font-size: 14px; margin-left: 8px;">Экспорт всех шаблонов</button>
      </div>
    </div>
  </div>
  <div class="a4-preview-wrap">
    <div class="a4-preview" id="a4-preview"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
let products = [
  {name:'Наименование товара', qty:1, price:250000, vatRate:20, hasVat:true},
  {name:'Лицензии ОС Альт', qty:12, price:5000, vatRate:20, hasVat:true}
];

// Дефолтные изображения
let headerImageSrc = 'https://i.ibb.co/0ppdynHq/5.png';
let footerImageSrc = 'https://i.ibb.co/845SzjDr/footer-img-blue-794.png';
let signatureImageSrc = 'https://i.ibb.co/JWCdVzX7/image.png';
let stampImageSrc = 'https://i.ibb.co/Ldxc4vDb/image.png';

// Ключ для хранения шаблонов
const TEMPLATES_KEY = 'tgd_quote_templates';

// Функции для работы с шаблонами
function saveTemplate() {
  const templateName = document.getElementById('templateName').value.trim();
  if (!templateName) {
    alert('Введите название шаблона');
    return;
  }
  
  // Собираем все данные формы
  const templateData = {
    name: templateName,
    data: {
      customer: document.getElementById('customer').value,
      inn: document.getElementById('inn').value,
      fio: document.getElementById('fio').value,
      manager: document.getElementById('manager').value,
      date: document.getElementById('date').value,
      quoteNo: document.getElementById('quoteNo').value,
      validityDate: document.getElementById('validityDate').value,
      deliveryTerm: document.getElementById('deliveryTerm').value,
      products: [...products],
      images: {
        header: headerImageSrc,
        footer: footerImageSrc,
        signature: signatureImageSrc,
        stamp: stampImageSrc
      }
    },
    createdAt: new Date().toISOString()
  };
  
  // Получаем существующие шаблоны
  const templates = getTemplates();
  
  // Проверяем, есть ли уже шаблон с таким именем
  const existingIndex = templates.findIndex(t => t.name === templateName);
  if (existingIndex >= 0) {
    if (!confirm(`Шаблон "${templateName}" уже существует. Перезаписать?`)) {
      return;
    }
    templates[existingIndex] = templateData;
  } else {
    templates.push(templateData);
  }
  
  // Сохраняем в localStorage
  localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates));
  
  // Очищаем поле ввода и обновляем список
  document.getElementById('templateName').value = '';
  renderTemplatesList();
  
  alert(`Шаблон "${templateName}" сохранен!`);
}

function loadTemplate(templateName) {
  const templates = getTemplates();
  const template = templates.find(t => t.name === templateName);
  
  if (!template) {
    alert('Шаблон не найден');
    return;
  }
  
  // Загружаем данные формы
  const data = template.data;
  document.getElementById('customer').value = data.customer || '';
  document.getElementById('inn').value = data.inn || '';
  document.getElementById('fio').value = data.fio || '';
  document.getElementById('manager').value = data.manager || '';
  document.getElementById('date').value = data.date || '';
  document.getElementById('quoteNo').value = data.quoteNo || '';
  document.getElementById('validityDate').value = data.validityDate || '';
  document.getElementById('deliveryTerm').value = data.deliveryTerm || '';
  
  // Загружаем товары
  products = data.products ? [...data.products] : [];
  
  // Загружаем изображения
  headerImageSrc = data.images?.header || null;
  footerImageSrc = data.images?.footer || null;
  signatureImageSrc = data.images?.signature || null;
  stampImageSrc = data.images?.stamp || null;
  
  // Обновляем интерфейс
  renderProductsList();
  updatePreview();
  
  alert(`Шаблон "${templateName}" загружен!`);
}

function deleteTemplate(templateName) {
  if (!confirm(`Удалить шаблон "${templateName}"?`)) {
    return;
  }
  
  const templates = getTemplates();
  const filteredTemplates = templates.filter(t => t.name !== templateName);
  localStorage.setItem(TEMPLATES_KEY, JSON.stringify(filteredTemplates));
  renderTemplatesList();
  
  alert(`Шаблон "${templateName}" удален!`);
}

function exportTemplate(templateName) {
  const templates = getTemplates();
  const template = templates.find(t => t.name === templateName);
  
  if (!template) {
    alert('Шаблон не найден');
    return;
  }
  
  const dataStr = JSON.stringify(template, null, 2);
  const dataBlob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(dataBlob);
  
  const link = document.createElement('a');
  link.href = url;
  link.download = `TGD_Template_${templateName.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_')}.json`;
  link.click();
  
  URL.revokeObjectURL(url);
}

function exportAllTemplates() {
  const templates = getTemplates();
  
  if (templates.length === 0) {
    alert('Нет сохраненных шаблонов для экспорта');
    return;
  }
  
  const dataStr = JSON.stringify(templates, null, 2);
  const dataBlob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(dataBlob);
  
  const link = document.createElement('a');
  link.href = url;
  link.download = `TGD_All_Templates_${new Date().toISOString().split('T')[0]}.json`;
  link.click();
  
  URL.revokeObjectURL(url);
}

function importTemplate(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedData = JSON.parse(e.target.result);
      const templates = getTemplates();
      
      // Проверяем, массив это или один шаблон
      const templatesToImport = Array.isArray(importedData) ? importedData : [importedData];
      
      let importedCount = 0;
      for (const template of templatesToImport) {
        if (template.name && template.data) {
          // Проверяем, есть ли уже такой шаблон
          const existingIndex = templates.findIndex(t => t.name === template.name);
          if (existingIndex >= 0) {
            if (confirm(`Шаблон "${template.name}" уже существует. Перезаписать?`)) {
              templates[existingIndex] = template;
              importedCount++;
            }
          } else {
            templates.push(template);
            importedCount++;
          }
        }
      }
      
      if (importedCount > 0) {
        localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates));
        renderTemplatesList();
        alert(`Импортировано шаблонов: ${importedCount}`);
      } else {
        alert('Не удалось импортировать шаблоны');
      }
      
    } catch (error) {
      alert('Ошибка при импорте файла. Проверьте формат файла.');
      console.error('Import error:', error);
    }
  };
  
  reader.readAsText(file);
  input.value = ''; // Очищаем input для возможности повторного импорта того же файла
}

function renderTemplatesList() {
  const templates = getTemplates();
  let html = '';
  
  if (templates.length === 0) {
    html = '<div style="color: #666; font-style: italic; font-size: 14px; padding: 10px 0;">Нет сохраненных шаблонов</div>';
  } else {
    html = templates.map(template => `
      <div class="template-item">
        <div class="template-name" onclick="loadTemplate('${template.name}')">
          ${template.name}
        </div>
        <div class="template-actions">
          <button class="template-btn" onclick="exportTemplate('${template.name}')" title="Экспорт">↓</button>
          <button class="template-btn delete" onclick="deleteTemplate('${template.name}')" title="Удалить">×</button>
        </div>
      </div>
    `).join('');
  }
  
  document.getElementById('templatesList').innerHTML = html;
}

function getTemplates() {
  const templatesJson = localStorage.getItem(TEMPLATES_KEY);
  return templatesJson ? JSON.parse(templatesJson) : [];
}

// Устанавливаем дату по умолчанию на 30 дней вперед
function setDefaultValidityDate() {
  const today = new Date();
  const futureDate = new Date(today);
  futureDate.setDate(today.getDate() + 30);
  
  const year = futureDate.getFullYear();
  const month = String(futureDate.getMonth() + 1).padStart(2, '0');
  const day = String(futureDate.getDate()).padStart(2, '0');
  
  document.getElementById('validityDate').value = `${year}-${month}-${day}`;
}

function removeRow(idx) {
  if (products.length > 1) { 
    products.splice(idx,1); 
    renderProductsList();
  }
}

function editRow(idx, field, value) {
  if (field === 'qty' || field === 'price' || field === 'vatRate') {
    let numValue = parseFloat(value) || 0;
    products[idx][field] = numValue;
  } else if (field === 'hasVat') {
    products[idx][field] = value;
    if (!value) {
      products[idx].vatRate = 0;
    } else if (products[idx].vatRate === 0) {
      products[idx].vatRate = 20;
    }
  } else {
    products[idx][field] = value;
  }
  renderProductsList();
}

function ruDate(val) {
  if (!val) return '';
  try {
    let d = new Date(val);
    return d.toLocaleDateString('ru-RU');
  } catch (e) {
    return val;
  }
}

function formatMoney(value) {
  if (!value && value !== 0) return '0';
  return Math.round(value).toLocaleString('ru-RU');
}

async function generatePDF() {
  const element = document.getElementById('a4-preview');
  try {
    const button = document.querySelector('.pdf-btn');
    const originalText = button.textContent;
    button.textContent = 'Генерируется PDF...';
    button.disabled = true;

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: element.offsetWidth,
      height: element.scrollHeight
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgData = canvas.toDataURL('image/png');
    const imgWidth = 210;
    const pageHeight = 297;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft >= 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const quoteNo = document.getElementById('quoteNo').value || 'КП-001';
    const customer = document.getElementById('customer').value || 'Клиент';
    const fileName = `ТехноГид_${quoteNo}_${customer.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_')}.pdf`;
    pdf.save(fileName);

    button.textContent = originalText;
    button.disabled = false;
  } catch (error) {
    console.error('Ошибка при генерации PDF:', error);
    alert('Произошла ошибка при генерации PDF. Попробуйте еще раз.');
    const button = document.querySelector('.pdf-btn');
    button.textContent = 'Генерировать PDF';
    button.disabled = false;
  }
}
